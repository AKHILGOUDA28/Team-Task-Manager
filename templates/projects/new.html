{% extends 'base.html' %}
{% block title %}New Project — TaskFlow{% endblock %}

{% block content %}
<div class="page-container">
  <div class="animate-slide-up" style="max-width:32rem;">
    <div style="margin-bottom:1.5rem;">
      <a href="{{ url_for('project.projects') }}" class="text-dimmed text-sm" style="display:inline-flex;align-items:center;gap:0.375rem;margin-bottom:1rem;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to Projects
      </a>
      <h1 class="text-2xl font-bold text-white">New Project</h1>
      <p class="text-muted text-sm" style="margin-top:0.25rem;">Create a project for {{ current_user.team.name }}</p>
    </div>

    <div class="glass rounded-2xl" style="padding:1.5rem;">
      <form method="POST" action="{{ url_for('project.new_project') }}" style="display:flex;flex-direction:column;gap:1.25rem;">
        <div>
          <label class="form-label" for="proj-name">Project name *</label>
          <input id="proj-name" class="input-field" type="text" name="name" placeholder="e.g. Website Redesign" required autofocus />
        </div>
        <div>
          <label class="form-label" for="proj-desc">Description</label>
          <textarea id="proj-desc" class="input-field" name="description" rows="3" placeholder="Brief description…" style="resize:vertical;"></textarea>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:0.25rem;">
          <button type="submit" class="btn-primary flex-1">Create Project</button>
          <a href="{{ url_for('project.projects') }}" class="btn-secondary flex-1">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
