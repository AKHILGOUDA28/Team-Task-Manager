{% extends 'base.html' %}
{% block title %}New Task — TaskFlow{% endblock %}

{% block content %}
<div class="page-container">
  <div class="animate-slide-up" style="max-width:36rem;">
    <div style="margin-bottom:1.5rem;">
      <a href="{{ url_for('task.tasks') }}" class="text-dimmed text-sm" style="display:inline-flex;align-items:center;gap:0.375rem;margin-bottom:1rem;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to Tasks
      </a>
      <h1 class="text-2xl font-bold text-white">New Task</h1>
      <p class="text-muted text-sm" style="margin-top:0.25rem;">Assign a task to your team</p>
    </div>

    <div class="glass rounded-2xl" style="padding:1.5rem;">
      <form id="create-task-form" method="POST" action="{{ url_for('task.new_task') }}" style="display:flex;flex-direction:column;gap:1.25rem;">

        <div>
          <label class="form-label" for="task-title-input">Task title *</label>
          <input id="task-title-input" class="input-field" type="text" name="title" placeholder="e.g. Design landing page" required autofocus />
        </div>

        <div>
          <label class="form-label" for="task-desc-input">Description</label>
          <textarea id="task-desc-input" class="input-field" name="description" rows="3" placeholder="Optional task details..." style="resize:vertical;"></textarea>
        </div>

        <div class="grid-2">
          <div>
            <label class="form-label" for="task-project-select">Project *</label>
            <select id="task-project-select" class="input-field" name="project_id" required>
              <option value="">Select project</option>
              {% for p in projects %}
              <option value="{{ p.id }}">{{ p.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="form-label">Assign to (Select members)</label>
            <div style="display: flex; flex-direction: column; gap: 0.5rem; max-height: 8rem; overflow-y: auto; padding: 0.65rem 0.9rem; background: #ffffff; border: 1px solid rgba(0,0,0,0.12); border-radius: 0.8rem; box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);">
              {% for m in members %}
              <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-primary); cursor: pointer;">
                <input type="checkbox" name="assigned_to" value="{{ m.id }}" style="cursor: pointer;" />
                {{ m.name }} ({{ m.role }})
              </label>
              {% endfor %}
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label class="form-label" for="task-deadline-input">Deadline</label>
            <input id="task-deadline-input" class="input-field" type="date" name="deadline" />
          </div>
          <div>
            <label class="form-label" for="task-status-select">Status</label>
            <select id="task-status-select" class="input-field" name="status">
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>

        <div>
          <label class="form-label" for="task-priority-select">Priority</label>
          <select id="task-priority-select" class="input-field" name="priority">
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>

        <div style="display:flex;gap:0.75rem;margin-top:0.25rem;">
          <button id="create-task-submit" type="submit" class="btn-primary flex-1">Create Task</button>
          <a href="{{ url_for('task.tasks') }}" class="btn-secondary flex-1">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
